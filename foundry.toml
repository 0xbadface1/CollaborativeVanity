[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"

# Remappings for import paths
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Enable optimizer for gas efficiency
optimizer = true
optimizer_runs = 200

# Use the IR-based compilation pipeline (Yul intermediate representation).
# This handles stack depth better and produces more optimized bytecode.
via_ir = true

# Fuzz testing config
[fuzz]
runs = 1000
